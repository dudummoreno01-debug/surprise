<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa para Jennyfer</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff007f;
            --secondary: #7000ff;
            --accent: #00f2ff;
            --bg: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg);
            color: white;
            overflow: hidden;
            height: 100vh;
            touch-action: manipulation;
        }

        /* Cursor Personalizado (Desktop) */
        #cursor {
            width: 20px; height: 20px; border: 2px solid var(--accent);
            border-radius: 50%; position: fixed; pointer-events: none;
            z-index: 9999; transition: transform 0.1s;
            display: none;
        }
        @media (min-width: 1024px) { #cursor { display: block; } body { cursor: none; } }

        .screen {
            position: absolute;
            width: 100%; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }

        .hidden { opacity: 0; filter: blur(20px); transform: scale(1.1); pointer-events: none; }
        .active { opacity: 1; filter: blur(0); transform: scale(1); }

        .btn {
            padding: 16px 45px;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; border: none; border-radius: 50px;
            font-weight: 700; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 2px; cursor: pointer; margin-top: 30px;
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.4);
            transition: 0.3s;
            z-index: 100;
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 30px var(--primary); }

        /* Estilo Balões */
        .balloon {
            position: absolute; width: 60px; height: 80px;
            border-radius: 50% 50% 50% 50% / 40% 40% 60% 60%;
            cursor: pointer; animation: floatUp 4s linear forwards;
            display: flex; align-items: center; justify-content: center;
        }
        .balloon::after { content: '🎈'; font-size: 2.2rem; }

        @keyframes floatUp { to { transform: translateY(-120vh) rotate(20deg); } }

        /* Estilo Final */
        .name-gradient {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(3.5rem, 12vw, 7rem);
            background: linear-gradient(to right, #fff, var(--primary), var(--accent), #fff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .congrats-text {
            max-width: 600px; font-size: 1.1rem; line-height: 1.6;
            background: rgba(255, 255, 255, 0.05);
            padding: 25px; border-radius: 20px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
            margin-top: 20px;
        }

        .firework {
            position: absolute; width: 4px; height: 4px; border-radius: 50%;
            animation: explode 0.8s ease-out forwards; pointer-events: none;
        }
        @keyframes explode {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(35); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>

    <audio id="bgMusic" loop>
        <source src="copymyflow.mp3" type="audio/mpeg">
    </audio>

    <section id="welcome" class="screen active">
        <h2 style="font-weight: 300; letter-spacing: 5px; margin-bottom: 10px;">UMA SURPRESA...</h2>
        <h1 style="font-family: 'Dancing Script'; font-size: 3.5rem; color: var(--primary);">Para Jennyfer</h1>
        <button class="btn" onclick="startApp()">Abrir Presente</button>
    </section>

    <section id="game" class="screen hidden">
        <h2 style="margin-bottom: 10px;">Estoure 10 balões de energia!</h2>
        <div style="font-size: 2.5rem; font-weight: 700; color: var(--accent);" id="score">0 / 10</div>
        <div id="canvas" style="width: 100%; height: 70%; position: relative; overflow: hidden;"></div>
    </section>

    <section id="suspense" class="screen hidden" style="background: #000;">
        <h1 id="suspense-msg" style="font-size: 1.5rem;">Sintonizando as melhores vibrações...</h1>
    </section>

    <section id="final" class="screen hidden">
        <h3 style="letter-spacing: 10px; color: var(--accent); font-size: 0.9rem;">PARABÉNS</h3>
        <h1 class="name-gradient">Jennyfer</h1>
        <div class="congrats-text">
            <p id="typed-text"></p>
        </div>
        <button class="btn" onclick="location.reload()" style="background: none; border: 1px solid rgba(255,255,255,0.2); font-size: 0.7rem;">Reiniciar</button>
    </section>

    <script>
        const cursor = document.getElementById('cursor');
        const music = document.getElementById('bgMusic');
        
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function changeScreen(id) {
            document.querySelectorAll('.screen').forEach(s => {
                s.classList.remove('active');
                s.classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
            document.getElementById(id).classList.add('active');
        }

        function startApp() {
            // Tenta dar play na música (precisa do clique do usuário)
            music.play().catch(e => console.log("O áudio iniciará após a interação."));
            changeScreen('game');
            startGame();
        }

        function startGame() {
            let count = 0;
            const canvas = document.getElementById('canvas');
            const colors = ['#ff007f', '#7000ff', '#00f2ff', '#ffd700'];

            const spawner = setInterval(() => {
                const b = document.createElement('div');
                b.className = 'balloon';
                b.style.left = (Math.random() * 80 + 10) + 'vw';
                b.style.bottom = '-100px';
                b.style.background = colors[Math.floor(Math.random() * colors.length)];
                
                const pop = () => {
                    count++;
                    document.getElementById('score').innerText = count + " / 10";
                    b.style.display = 'none';
                    if(count >= 10) {
                        clearInterval(spawner);
                        triggerSuspense();
                    }
                };

                b.addEventListener('mousedown', pop);
                b.addEventListener('touchstart', pop);

                canvas.appendChild(b);
                setTimeout(() => b.remove(), 4000);
            }, 600);
        }

        function triggerSuspense() {
            changeScreen('suspense');
            const msg = document.getElementById('suspense-msg');
            setTimeout(() => { msg.innerText = "Preparando a grande revelação..."; msg.style.color = "#ff007f"; }, 1500);
            setTimeout(() => { msg.innerText = "3... 2... 1..."; msg.style.color = "#fff"; }, 3000);
            setTimeout(() => {
                changeScreen('final');
                startFinalEffects();
            }, 4500);
        }

        function startFinalEffects() {
            const text = "Jennyfer, hoje celebramos você! Que este novo ciclo seja transbordante de saúde, conquistas e momentos inesquecíveis. Você é uma pessoa incrível e merece que todos os seus sonhos se tornem realidade. Feliz aniversário! ✨🎂";
            let i = 0;
            const target = document.getElementById('typed-text');
            
            function type() {
                if (i < text.length) {
                    target.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, 50);
                }
            }
            type();
            setInterval(createFirework, 500);
        }

        function createFirework() {
            const f = document.createElement('div');
            f.className = 'firework';
            const final = document.getElementById('final');
            f.style.left = Math.random() * 100 + 'vw';
            f.style.top = Math.random() * 100 + 'vh';
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            f.style.backgroundColor = color;
            f.style.boxShadow = `0 0 20px 5px ${color}`;
            final.appendChild(f);
            setTimeout(() => f.remove(), 800);
        }
    </script>
</body>
</html>
