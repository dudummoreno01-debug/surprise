<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Aniversário Jennyfer 🎂💖</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: black;
  color: white;
  overflow: hidden;
}

/* 🌌 FUNDO CINEMATOGRÁFICO */
body::before {
  content: "";
  position: absolute;
  width: 200%;
  height: 200%;
  background: radial-gradient(circle, #ff2bd6, #6a00ff, black);
  filter: blur(60px);
  animation: bg 10s infinite alternate;
  z-index: -1;
}

@keyframes bg {
  from {transform: scale(1);}
  to {transform: scale(1.2);}
}

/* 🎬 CENAS AAA */
.scene {
  position: absolute;
  width: 100vw;
  height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  text-align: center;
  padding: 20px;

  opacity: 0;
  transform: scale(1.08);
  filter: blur(10px);
  pointer-events: none;

  transition: opacity 1.2s ease, transform 1.2s ease, filter 1.2s ease;
}

.active {
  opacity: 1;
  transform: scale(1);
  filter: blur(0);
  pointer-events: auto;
}

/* 💖 TEXTO */
h1 {
  text-shadow: 0 0 25px pink;
}

p {
  max-width: 90%;
  font-size: 1.1em;
}

/* 🔘 BOTÕES */
button {
  margin-top: 10px;
  padding: 14px 24px;
  border-radius: 25px;
  border: none;
  cursor: pointer;
  background: hotpink;
  color: white;
  font-weight: bold;
  font-size: 1em;
  width: 80%;
  max-width: 300px;
}

/* 🎵 BOTÃO MÚSICA */
#musicBtn {
  position: absolute;
  top: 15px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

/* 🎊 CONFETE REALISTA */
.confetti {
  position: absolute;
  width: 10px;
  height: 16px;
  opacity: 0.9;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-10vh) rotate(0deg); }
  100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* 🐱 GATOS */
.cat {
  position: absolute;
  font-size: 28px;
  animation: float 3s infinite alternate;
}

@keyframes float {
  from {transform: translateY(0);}
  to {transform: translateY(-20px);}
}
</style>
</head>

<body>

<!-- 🎵 MÚSICA LOCAL -->
<audio id="music" loop>
  <source src="фрози (frozy), Mwizz, George Kipa - Don't Copy My Flow (s l o w e d + r e v e r b) - Siyardley (youtube).mp3" type="audio/mpeg">
</audio>

<button id="musicBtn" onclick="startMusic()">🎵 Iniciar Música</button>

<!-- 1 -->
<div class="scene active" id="s1">
  <h1>🎂 Feliz Aniversário Jennyfer</h1>
  <button onclick="next(2)">Começar</button>
</div>

<!-- 2 -->
<div class="scene" id="s2">
  <h1>💌 Uma mensagem apareceu</h1>
  <button onclick="next(3)">Abrir</button>
</div>

<!-- 3 -->
<div class="scene" id="s3">
  <h1>📱 Escolha seu caminho</h1>
  <button onclick="choice('heart')">Coração ❤️</button>
  <button onclick="choice('mind')">Razão 🧠</button>
</div>

<!-- 4 -->
<div class="scene" id="s4">
  <h1>🧠 Caminho da Razão</h1>
  <button onclick="next(3)">Voltar</button>
</div>

<!-- 5 -->
<div class="scene" id="s5">
  <h1>💖 Caminho do Coração</h1>
  <p id="story"></p>
  <button onclick="next(6)">Continuar</button>
</div>

<!-- 6 -->
<div class="scene" id="s6">
  <h1>💌 Decisão Final</h1>
  <button onclick="final()">Finalizar 🎂</button>
</div>

<!-- FINAL -->
<div class="scene" id="end">
  <h1>🎉 Mensagem Final</h1>
  <p>
    Jennyfer... isso foi feito pra você 💖  
    Feliz aniversário 🎂✨
  </p>
</div>

<script>

let affinity = 0;

/* 🎵 MÚSICA COM FADE IN */
function startMusic(){
  let music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let v = 0;
  let fade = setInterval(() => {
    if(v < 1){
      v += 0.05;
      music.volume = v;
    } else {
      clearInterval(fade);
    }
  }, 100);
}

/* 🎬 CENAS */
function next(id){
  document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
  setTimeout(() => {
    document.getElementById("s"+id).classList.add("active");
  }, 300);
}

/* 💖 ESCOLHA */
function choice(type){
  if(type === "heart"){
    affinity++;
    next(5);
    typeText("Você seguiu o coração... 💖");
  } else {
    next(4);
  }
}

/* ✍️ TEXTO */
function typeText(text){
  let i = 0;
  document.getElementById("story").innerHTML = "";

  function typing(){
    if(i < text.length){
      document.getElementById("story").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 30);
    }
  }

  typing();
}

/* 🎯 FINAL + SURPRESA */
function final(){
  document.querySelectorAll(".scene").forEach(s => s.classList.remove("active"));
  document.getElementById("end").classList.add("active");

  surprise();
}

/* 🎉 SURPRESA CINEMATOGRÁFICA */
function surprise(){

  setTimeout(() => {
    document.body.style.background = "black";

    setTimeout(() => {
      document.body.style.background =
      "radial-gradient(circle, #ff00cc, #00ffff, #ffcc00)";

      confetti();
      cats();
      emojis();

    }, 2000);

  }, 1000);
}

/* 🎊 CONFETE REALISTA */
function confetti(){
  const colors = ["#ff0","#f0f","#0ff","#fff","#ff4","#4ff"];

  for(let i=0;i<300;i++){
    let c = document.createElement("div");
    c.className = "confetti";

    c.style.left = Math.random()*100 + "vw";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];

    c.style.width = (6 + Math.random()*6) + "px";
    c.style.height = (10 + Math.random()*12) + "px";

    c.style.animationDuration = (3 + Math.random()*3) + "s";

    document.body.appendChild(c);

    setTimeout(()=>c.remove(),8000);
  }
}

/* 🐱 GATOS */
function cats(){
  for(let i=0;i<25;i++){
    let g = document.createElement("div");
    g.className = "cat";
    g.innerHTML = "🐱";
    g.style.left = Math.random()*100 + "vw";
    g.style.top = Math.random()*100 + "vh";
    document.body.appendChild(g);

    setTimeout(()=>g.remove(),8000);
  }
}

/* 🎉 EMOJIS */
function emojis(){
  let e = ["🎂","🎉","🎊","💖","✨","🎁"];

  for(let i=0;i<50;i++){
    let el = document.createElement("div");
    el.innerHTML = e[Math.floor(Math.random()*e.length)];
    el.style.position = "absolute";
    el.style.left = Math.random()*100 + "vw";
    el.style.top = Math.random()*100 + "vh";
    el.style.fontSize = "25px";
    document.body.appendChild(el);

    setTimeout(()=>el.remove(),8000);
  }
}

</script>

</body>
</html>
